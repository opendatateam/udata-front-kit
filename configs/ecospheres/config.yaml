      path: /dataservices
    - name: Indicateurs phares
      path: /indicators
    - name: Contributeurs
      path: /organizations
    - name: À propos
      path: /about
    - name: Conditions générales d'utilisation
      path: /terms
    - name: Accessibilité
      path: /accessibility
