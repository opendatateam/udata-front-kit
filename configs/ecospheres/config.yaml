# config file for ecospheres-front

# used as extras key
site_id: ecospheres

# sentry:                                     # optional, add only if you want to monitor errors with sentry
#   dsn: {string}                             # the DSN of the sentry project
#   domain_url: {string}                      # the domain to send sourcemaps to
#   environment: {string}                     # the environment to send to sentry (production, preprod, etc.)
#   ... For other sentry options, see ./src/model/config.ts

datagouvfr:
  # data.gouv.fr base URL (use www subdomain on prod)
  base_url: https://demo.data.gouv.fr
  # oauth settings
  oauth_client_id: 66e30254d3cc5d5b52a4b6ec
  tabular_api_url: https://tabular-api.preprod.data.gouv.fr

# UI customizations
website:
  title: 'ecologie.data.gouv.fr'
  seo:
    canonical_url: https://demo.ecologie.data.gouv.fr
    # global metas injected
    meta:
      keywords: 'écologie, données, aménagement du territoire, API, indicateurs, data, transition écologique, environnement, climat, énergie, eau, météo, biodiversité, mobilité, territoire, adaptation, risques, bruit, mer, CGDD, Ecolab'
      description: |
        Accédez aux données de référence pour la transition écologique. Découvrez, réutilisez et partagez votre expertise pour agir en faveur d’un avenir durable grâce aux jeux de données, indicateurs et collections thématiques des services de l’État et des collectivités.
      robots: 'noindex, nofollow'
    # robots.txt content (consumed by udata-front-kit-seo)
    robots_txt:
      disallow:
        - /admin
        - /datasets
        - /organizations
    # sitemap.xml content (consumed by udata-front-kit-seo)
    sitemap_xml:
      topics_pages: []
      datasets_pages: []
      dataservices_pages: []
  formatted_title: '<i>ecologie.</i><b>data.gouv</b><i>.fr</i>'
  rf_title: 'RÉPUBLIQUE<br>FRANÇAISE'
  service_logo: '/static/logos/ecospheres-logo.svg'
  badge:
    display: false
    text:
    style:
  # leave empty if not pertinent
  logo_operator:
    src: '/static/logos/ecospheres-logo.svg'
    show_in_header: false
    footer:
      width: '40px'
      height: '219px'
  homepage:
    title:
    subtitle:
    sections:
      - title:
        content:
        sub_section_datasets:
        sub_section_cards:
        sub_section_tiles:
        sub_section_buttons:
    meta_description: ecologie.data.gouv.fr référence et centralise les données de la transition écologique.
  header:
    admin_shortcut: true
    button:
      display: true
      label: 'Donnez votre avis'
      link: https://tally.so/r/wLWrzp
    search:
      display: false
      placeholder:
      dropdown:
  search_bar:
    display: true
    placeholder: Rechercher une donnée environnementale
  secondary_search:
    display: false
    name:
    link:
  footer_phrase: "Ce site est une déclinaison thématique de data.gouv.fr sur les données relatives à la transition écologique et énergétique, réalisé par le ministère en charge de l'environnement"
  footer_external_links:
    - label: 'data.gouv.fr'
      href: 'https://www.data.gouv.fr'
      title: 'data.gouv.fr - nouvelle fenêtre'
    - label: 'legifrance.gouv.fr'
      href: 'https://www.legifrance.gouv.fr/'
      title: 'legifrance - nouvelle fenêtre'
    - label: 'ecologie.gouv.fr'
      href: 'https://ecologie.gouv.fr'
      title: 'ecologie.gouv.fr - nouvelle fenêtre'
    - label: 'gouvernement.fr'
      href: 'https://www.gouvernement.fr'
      title: 'gouvernement.fr - nouvelle fenêtre'
  footer_mandatory_links:
    - label: 'Contact'
      href: 'https://tally.so/r/m61AqO'
    - label: 'Plan du site'
      to: '/sitemap'
    - label: "Conditions générales d'utilisation"
      to: '/terms'
    - label: 'Politique de confidentialité'
      href: 'https://www.data.gouv.fr/fr/suivi/'
    - label: 'Accessibilité : partiellement conforme'
      to: '/accessibility'
  notice:
    display: true
    content: ⚠️ Vous naviguez sur une version de développement d'ecologie.data.gouv.fr ⚠️
    closeable: false
  # ⚠️ When updating this menu, also update the sitemap below if needed
