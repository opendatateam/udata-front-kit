    - text: Accueil
      to: /
    - text: Toutes les données
      to: /datasets
    - text: Indicateurs phares
      to: /indicators
    - text: API
      to: /dataservices
    - text: Collections thématiques
      to: /bouquets
    - text: Contributeurs
      to: /organizations
    - text: À propos
      to: /about
  router:
    disable:
      - topics
    # ⚠️ When updating this list, also update the sitemap below if needed
